services:
  glance:
    container_name: glance
    image: glanceapp/glance
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - USER_ID=1000
      - GROUP_ID=1000
      - TZ=Europe/Berlin
      - LANG=de_DE.UTF-8
    volumes:
      - /mnt/appserver/glance/config:/app/config
      - /mnt/appserver/glance/assets:/app/assets
      - /etc/localtime:/etc/localtime:ro
      # Optionally, also mount docker socket if you want to use the docker containers widget
      # - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 10140:8080
    env_file: /mnt/appserver/glance/.env
